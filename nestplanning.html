<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nestplanning - Emmaliedoodles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=Public+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8b9a78">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Public Sans', system-ui, sans-serif;
      font-weight: 300;
      background: #f4f1ec;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
    }

    .app-header {
      width: 100%;
      background: white;
      border-bottom: 1px solid #e8e4de;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .app-header-title {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 20px;
      color: #43554f;
      letter-spacing: -0.02em;
    }

    .back-btn {
      font-family: 'Public Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: #5f6e5e;
      text-decoration: none;
    }
    .back-btn:hover { color: #43554f; }

    .card {
      background: white;
      border-radius: 4px;
      padding: 32px 24px;
      width: 100%;
      max-width: 560px;
      margin-top: 24px;
    }

    @media (min-width: 480px) {
      .card { padding: 48px; }
      body { padding: 0 16px 40px; }
    }

    .header {
      margin-bottom: 40px;
    }

    .header h1 {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 32px;
      color: #43554f;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }

    .header p {
      font-size: 14px;
      font-weight: 300;
      color: #5f6e5e;
      margin-top: 6px;
      letter-spacing: 0.01em;
    }

    .divider {
      height: 1px;
      background: #e8e4de;
      margin: 32px 0;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #43554f;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="date"] {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid #d6d0c8;
      border-radius: 2px;
      font-family: 'Public Sans', sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: #282D33;
      background: #faf8f5;
      transition: border-color 0.3s;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="text"]:focus,
    input[type="date"]:focus {
      border-color: #43554f;
      background: white;
    }

    input[type="text"]::placeholder {
      color: #b0a898;
    }

    .hint {
      font-size: 12px;
      font-weight: 300;
      color: #a09890;
      margin-top: 5px;
    }

    .btn {
      width: 100%;
      padding: 15px 24px;
      background: #43554f;
      color: white;
      border: none;
      border-radius: 100px;
      font-family: 'Public Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.3s, opacity 0.3s, transform 0.3s, box-shadow 0.3s;
      margin-top: 8px;
    }

    .btn:hover {
      background: #5f6e5e;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(67, 85, 79, 0.2);
    }

    .btn:active { transform: translateY(0); }

    .btn:disabled {
      background: #a3b0ab;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: white;
      color: #43554f;
      border: 1.5px solid #43554f;
      margin-top: 10px;
    }

    .btn-secondary:hover {
      background: #f4f1ec;
    }

    .btn-secondary:disabled {
      background: white;
      color: #a3b0ab;
      border-color: #a3b0ab;
    }

    .status {
      margin-top: 24px;
      padding: 14px 18px;
      border-radius: 2px;
      font-size: 14px;
      font-weight: 300;
      display: none;
    }

    .status.info {
      background: #edf0ef;
      color: #43554f;
      border-left: 3px solid #43554f;
      display: block;
    }

    .status.error {
      background: #fdf0ef;
      color: #8b3a32;
      border-left: 3px solid #c0392b;
      display: block;
    }

    .status.success {
      background: #edf2ef;
      color: #2e5240;
      border-left: 3px solid #43554f;
      display: block;
    }

    .event-list {
      margin-top: 24px;
      display: none;
    }

    .event-list-title {
      font-size: 11px;
      font-weight: 500;
      color: #a09890;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .event-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid #f0ece6;
    }

    .event-item:last-child {
      border-bottom: none;
    }

    .event-check {
      width: 22px;
      height: 22px;
      background: #43554f;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: white;
      font-size: 11px;
    }

    .event-info { flex: 1; }

    .event-title {
      font-size: 14px;
      font-weight: 400;
      color: #282D33;
    }

    .event-date {
      font-size: 12px;
      font-weight: 300;
      color: #a09890;
      margin-top: 2px;
    }

    .event-week {
      font-size: 11px;
      font-weight: 500;
      color: #5f6e5e;
      background: #edf0ef;
      padding: 3px 10px;
      border-radius: 100px;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .planning-group { margin-bottom: 24px; }

    .planning-nest-name {
      font-size: 13px;
      font-weight: 500;
      color: #a09890;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .planning-event {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid #f0ece6;
    }
    .planning-event:last-child { border-bottom: none; }

    .planning-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #43554f;
      flex-shrink: 0;
    }

    .planning-info { flex: 1; }

    .planning-title { font-size: 14px; font-weight: 400; color: #282D33; }
    .planning-date  { font-size: 12px; color: #a09890; margin-top: 2px; }
  </style>
</head>
<body>
  <header class="app-header">
    <span class="app-header-title">Emmaliedoodles</span>
    <a href="index.html" class="back-btn">&#8592; Fokprogramma</a>
  </header>

  <div class="card">
    <div class="header">
      <h1>Nestplanning</h1>
      <p>Emmaliedoodles &mdash; Australian Labradoodles</p>
    </div>

    <div class="form-group">
      <label for="nestnaam">Nestnaam</label>
      <input type="text" id="nestnaam" placeholder="bijv. Nestje Rood" autocomplete="off">
      <p class="hint">Wordt toegevoegd aan elke afspraak in de agenda</p>
    </div>

    <div class="form-group">
      <label for="geboortedatum">Geboortedatum pups</label>
      <input type="date" id="geboortedatum">
    </div>

    <button class="btn" id="planBtn" onclick="startFlow()">
      Inloggen met Google en planning aanmaken
    </button>
    <button class="btn btn-secondary" id="updateBtn" onclick="startUpdateFlow()">
      Bestaande afspraken bijwerken
    </button>

    <div class="status" id="status"></div>
    <div class="event-list" id="eventList"></div>
  </div>

  <!-- Huidige nestplanning card -->
  <div class="card" style="margin-top:16px">
    <div style="font-family:'Fraunces',serif;font-weight:300;font-size:20px;color:#43554f;letter-spacing:-0.02em;margin-bottom:10px">Huidige nestplanning</div>
    <p style="font-size:14px;color:#5f6e5e;margin-bottom:20px">Bekijk aankomende nestafspraken in de agenda</p>
    <button class="btn btn-secondary" id="loadPlanningBtn" onclick="loadNestPlanning()">
      Inloggen en planning tonen
    </button>
    <div class="status" id="statusLoad"></div>
    <div id="nestPlanningList" style="margin-top:20px"></div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const CLIENT_ID = '248696672626-0tcv73h1m27ekf2vc3k41vu5cb3l4sob.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/calendar';
    const CALENDAR_NAME = 'Emmaliedoodles';

    const SCHEMA = [
      {
        day: 0, week: 'Dag 0', title: 'Pups geboren',
        notes: '',
      },
      {
        day: 21, week: 'Week 3', title: 'Ontwormen',
        notes: '', timedReminder: true,
      },
      {
        day: 28, week: 'Week 4', title: 'Kennismakingsgesprekken kopers',
        notes: '• Spullen vachtverzorging klaarleggen voor kopers\n• Invulformulieren vachtverzorging producten printen\n• Kopers informeren over vachtverzorging en voeding',
      },
      {
        day: 35, week: 'Week 5', title: 'Ontwormen',
        notes: '', timedReminder: true,
      },
      {
        day: 42, week: 'Week 6', title: 'Vaccinatie + chip',
        notes: '• Afspraak dierenarts: vaccinatie + chip inbrengen\n• Puppypaspoort ophalen en controleren\n• Chipnummers registreren per pup\n• Inschrijven ALAEU\n• Koopcontracten opstellen',
      },
      {
        day: 42, week: 'Week 6', title: 'Puppy kijkmoment + voorkeur doorgeven',
        notes: '• Kopers uitnodigen voor kijkmoment\n• Kopers geven hun voorkeur door\n• Foto\'s maken per pup',
      },
      {
        day: 49, week: 'Week 7', title: 'Ontwormen',
        notes: '', timedReminder: true,
      },
      {
        day: 53, week: 'Week 7.5', title: 'Pups mogen vertrekken',
        notes: '• Vanaf deze datum mogen pups naar hun nieuwe thuis\n• Meegeven: puppypas en chipregistratieformulier\n• Meegeven: vachtproductenlijst, voedingsadvies en startpakket\n• Meegeven: nestknuffel\n• Meegeven: informatiepapier chippen en inenten\n• Kopers informeren dat ze hun pup kunnen ophalen',
      },
    ];

    let tokenClient = null;
    let accessToken = null;

    function initTokenClient() {
      if (tokenClient) return;
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: handleToken,
      });
    }

    function startFlow() {
      const nestnaam = document.getElementById('nestnaam').value.trim();
      const geboortedatum = document.getElementById('geboortedatum').value;

      if (!nestnaam) { showStatus('Vul een nestnaam in.', 'error'); return; }
      if (!geboortedatum) { showStatus('Vul een geboortedatum in.', 'error'); return; }

      if (typeof google === 'undefined') {
        showStatus('Google script nog niet geladen. Wacht even en probeer opnieuw.', 'error');
        return;
      }

      document.getElementById('planBtn').disabled = true;
      document.getElementById('updateBtn').disabled = true;
      document.getElementById('eventList').style.display = 'none';

      initTokenClient();
      tokenClient.requestAccessToken({ prompt: 'consent' });
    }

    async function findCalendarId() {
      const res = await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList?showHidden=true', {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      if (!res.ok) throw new Error('Kan agendalist niet ophalen.');
      const data = await res.json();
      const cal = (data.items || []).find(c =>
        c.summary && c.summary.toLowerCase() === CALENDAR_NAME.toLowerCase()
      );
      return cal ? cal.id : null;
    }

    function addDays(dateStr, days) {
      const d = new Date(dateStr + 'T00:00:00');
      d.setDate(d.getDate() + days);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    async function createAllEvents() {
      const nestnaam = document.getElementById('nestnaam').value.trim();
      const geboortedatum = document.getElementById('geboortedatum').value;

      showStatus('Emmaliedoodles agenda zoeken...', 'info');

      let calendarId;
      try {
        calendarId = await findCalendarId();
      } catch (e) {
        showStatus(e.message, 'error');
        document.getElementById('planBtn').disabled = false;
        return;
      }

      if (!calendarId) {
        const names = (await (await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList?showHidden=true', { headers: { Authorization: `Bearer ${accessToken}` } })).json()).items.map(c => c.summary).join(', ');
        showStatus(`Agenda "${CALENDAR_NAME}" niet gevonden. Gevonden agenda's: ${names}`, 'error');
        document.getElementById('planBtn').disabled = false;
        document.getElementById('updateBtn').disabled = false;
        return;
      }

      const created = [];

      for (let i = 0; i < SCHEMA.length; i++) {
        const item = SCHEMA[i];
        showStatus(`Aanmaken ${i + 1} van ${SCHEMA.length}...`, 'info');

        const dateStr = addDays(geboortedatum, item.day);
        const nextDay = addDays(geboortedatum, item.day + 1);

        const body = {
          summary: `${item.title} \u2013 ${nestnaam}`,
          description: item.notes
            ? `${item.week} | Nestje: ${nestnaam}\nGeboren: ${formatDate(geboortedatum)}\n\n${item.notes}`
            : `${item.week} | Nestje: ${nestnaam}\nGeboren: ${formatDate(geboortedatum)}`,
          start: { date: dateStr },
          end:   { date: nextDay },
        };

        const res = await fetch(
          `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events`,
          {
            method: 'POST',
            headers: {
              Authorization: `Bearer ${accessToken}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(body),
          }
        );

        if (!res.ok) {
          const err = await res.json();
          showStatus(`Fout bij aanmaken "${item.title}": ${err.error?.message || res.status}`, 'error');
          document.getElementById('planBtn').disabled = false;
          document.getElementById('updateBtn').disabled = false;
          return;
        }

        created.push({ ...item, date: dateStr });

        if (item.timedReminder) {
          const reminderBody = {
            summary: `${item.title} \u2013 ${nestnaam}`,
            start: { dateTime: `${dateStr}T21:00:00`, timeZone: 'Europe/Amsterdam' },
            end:   { dateTime: `${dateStr}T21:30:00`, timeZone: 'Europe/Amsterdam' },
            reminders: { useDefault: false, overrides: [{ method: 'popup', minutes: 0 }] },
          };
          const reminderRes = await fetch(
            `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events`,
            {
              method: 'POST',
              headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
              body: JSON.stringify(reminderBody),
            }
          );
          if (!reminderRes.ok) {
            const err = await reminderRes.json();
            showStatus(`Fout bij aanmaken reminder "${item.title}": ${err.error?.message || reminderRes.status}`, 'error');
            document.getElementById('planBtn').disabled = false;
            document.getElementById('updateBtn').disabled = false;
            return;
          }
        }
      }

      showStatus(`Klaar! ${created.length} afspraken aangemaakt in de ${CALENDAR_NAME} agenda.`, 'success');
      showEventList(created);
      document.getElementById('planBtn').disabled = false;
      document.getElementById('updateBtn').disabled = false;
    }

    let updateMode = false;

    function startUpdateFlow() {
      const nestnaam = document.getElementById('nestnaam').value.trim();
      const geboortedatum = document.getElementById('geboortedatum').value;

      if (!nestnaam) { showStatus('Vul een nestnaam in.', 'error'); return; }
      if (!geboortedatum) { showStatus('Vul een geboortedatum in.', 'error'); return; }

      if (typeof google === 'undefined') {
        showStatus('Google script nog niet geladen. Wacht even en probeer opnieuw.', 'error');
        return;
      }

      document.getElementById('updateBtn').disabled = true;
      document.getElementById('planBtn').disabled = true;
      document.getElementById('eventList').style.display = 'none';

      updateMode = true;
      initTokenClient();
      tokenClient.requestAccessToken({ prompt: 'consent' });
    }

    async function handleToken(response) {
      if (response.error) {
        showStatus('Inloggen mislukt: ' + response.error, 'error');
        document.getElementById('planBtn').disabled = false;
        document.getElementById('updateBtn').disabled = false;
        document.getElementById('loadPlanningBtn').disabled = false;
        return;
      }
      accessToken = response.access_token;
      if (pendingLoadPlanning) {
        pendingLoadPlanning = false;
        await doLoadNestPlanning();
      } else if (updateMode) {
        updateMode = false;
        await updateAllEvents();
      } else {
        await createAllEvents();
      }
    }

    async function findExistingEvents(calendarId, nestnaam, geboortedatum) {
      let events = [];
      let pageToken = null;
      const timeMin = encodeURIComponent(geboortedatum + 'T00:00:00Z');
      do {
        const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events?q=${encodeURIComponent('– ' + nestnaam)}&timeMin=${timeMin}&maxResults=250${pageToken ? '&pageToken=' + pageToken : ''}`;
        const res = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
        if (!res.ok) throw new Error('Kan bestaande afspraken niet ophalen.');
        const data = await res.json();
        const matching = (data.items || []).filter(e =>
          e.summary && e.summary.includes(`– ${nestnaam}`) && e.status !== 'cancelled'
        );
        events = events.concat(matching);
        pageToken = data.nextPageToken || null;
      } while (pageToken);
      return events;
    }

    async function deleteEvent(calendarId, eventId) {
      const res = await fetch(
        `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events/${encodeURIComponent(eventId)}`,
        { method: 'DELETE', headers: { Authorization: `Bearer ${accessToken}` } }
      );
      if (!res.ok && res.status !== 404 && res.status !== 410) {
        throw new Error(`Fout bij verwijderen: ${res.status}`);
      }
    }

    async function updateAllEvents() {
      const nestnaam = document.getElementById('nestnaam').value.trim();
      const geboortedatum = document.getElementById('geboortedatum').value;

      showStatus('Emmaliedoodles agenda zoeken...', 'info');

      let calendarId;
      try {
        calendarId = await findCalendarId();
      } catch (e) {
        showStatus(e.message, 'error');
        document.getElementById('planBtn').disabled = false;
        document.getElementById('updateBtn').disabled = false;
        return;
      }

      if (!calendarId) {
        showStatus(`Agenda "${CALENDAR_NAME}" niet gevonden.`, 'error');
        document.getElementById('planBtn').disabled = false;
        document.getElementById('updateBtn').disabled = false;
        return;
      }

      showStatus(`Bestaande afspraken zoeken voor ${nestnaam}...`, 'info');
      let existing;
      try {
        existing = await findExistingEvents(calendarId, nestnaam, geboortedatum);
      } catch (e) {
        showStatus(e.message, 'error');
        document.getElementById('planBtn').disabled = false;
        document.getElementById('updateBtn').disabled = false;
        return;
      }

      for (let i = 0; i < existing.length; i++) {
        showStatus(`Verwijderen ${i + 1} van ${existing.length}...`, 'info');
        try {
          await deleteEvent(calendarId, existing[i].id);
        } catch (e) {
          showStatus(e.message, 'error');
          document.getElementById('planBtn').disabled = false;
          document.getElementById('updateBtn').disabled = false;
          return;
        }
      }

      const created = [];
      for (let i = 0; i < SCHEMA.length; i++) {
        const item = SCHEMA[i];
        showStatus(`Aanmaken ${i + 1} van ${SCHEMA.length}...`, 'info');

        const dateStr = addDays(geboortedatum, item.day);
        const nextDay = addDays(geboortedatum, item.day + 1);

        const body = {
          summary: `${item.title} – ${nestnaam}`,
          description: item.notes
            ? `${item.week} | Nestje: ${nestnaam}\nGeboren: ${formatDate(geboortedatum)}\n\n${item.notes}`
            : `${item.week} | Nestje: ${nestnaam}\nGeboren: ${formatDate(geboortedatum)}`,
          start: { date: dateStr },
          end:   { date: nextDay },
        };

        const res = await fetch(
          `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events`,
          {
            method: 'POST',
            headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          }
        );

        if (!res.ok) {
          const err = await res.json();
          showStatus(`Fout bij aanmaken "${item.title}": ${err.error?.message || res.status}`, 'error');
          document.getElementById('planBtn').disabled = false;
          document.getElementById('updateBtn').disabled = false;
          return;
        }

        created.push({ ...item, date: dateStr });

        if (item.timedReminder) {
          const reminderBody = {
            summary: `${item.title} – ${nestnaam}`,
            start: { dateTime: `${dateStr}T21:00:00`, timeZone: 'Europe/Amsterdam' },
            end:   { dateTime: `${dateStr}T21:30:00`, timeZone: 'Europe/Amsterdam' },
            reminders: { useDefault: false, overrides: [{ method: 'popup', minutes: 0 }] },
          };
          const reminderRes = await fetch(
            `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events`,
            {
              method: 'POST',
              headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
              body: JSON.stringify(reminderBody),
            }
          );
          if (!reminderRes.ok) {
            const err = await reminderRes.json();
            showStatus(`Fout bij aanmaken reminder "${item.title}": ${err.error?.message || reminderRes.status}`, 'error');
            document.getElementById('planBtn').disabled = false;
            document.getElementById('updateBtn').disabled = false;
            return;
          }
        }
      }

      showStatus(`Klaar! ${existing.length} oude afspraken verwijderd en ${created.length} bijgewerkte afspraken aangemaakt.`, 'success');
      showEventList(created);
      document.getElementById('planBtn').disabled = false;
      document.getElementById('updateBtn').disabled = false;
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    async function loadNestPlanning() {
      if (typeof google === 'undefined') {
        showStatusLoad('Google script nog niet geladen. Probeer opnieuw.', 'error'); return;
      }
      document.getElementById('loadPlanningBtn').disabled = true;
      showStatusLoad('Planning ophalen...', 'info');

      if (!accessToken) {
        pendingLoadPlanning = true;
        initTokenClient();
        tokenClient.requestAccessToken({ prompt: '' });
        return;
      }
      await doLoadNestPlanning();
    }

    let pendingLoadPlanning = false;

    async function doLoadNestPlanning() {
      let calendarId;
      try { calendarId = await findCalendarId(); }
      catch (e) { showStatusLoad(e.message, 'error'); document.getElementById('loadPlanningBtn').disabled = false; return; }

      if (!calendarId) {
        showStatusLoad(`Agenda "${CALENDAR_NAME}" niet gevonden.`, 'error');
        document.getElementById('loadPlanningBtn').disabled = false; return;
      }

      const now      = new Date();
      const timeMin  = encodeURIComponent(now.toISOString());
      const future   = new Date(now); future.setMonth(future.getMonth() + 18);
      const timeMax  = encodeURIComponent(future.toISOString());

      let events = [], pageToken = null;
      do {
        const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events?timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime&maxResults=250${pageToken ? '&pageToken=' + pageToken : ''}`;
        const res = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
        if (!res.ok) { showStatusLoad('Fout bij ophalen.', 'error'); document.getElementById('loadPlanningBtn').disabled = false; return; }
        const data = await res.json();
        events = events.concat(data.items || []);
        pageToken = data.nextPageToken || null;
      } while (pageToken);

      const NEST_TITLES = ['Pups geboren', 'Ontwormen', 'Kennismakingsgesprekken', 'Vaccinatie', 'Puppy kijkmoment', 'Pups mogen vertrekken'];
      const nestEvents = events.filter(e =>
        e.status !== 'cancelled' && e.summary &&
        NEST_TITLES.some(t => e.summary.startsWith(t)) &&
        e.summary.includes(' – ')
      );

      const el = document.getElementById('nestPlanningList');
      if (!nestEvents.length) {
        el.innerHTML = '<p style="text-align:center;padding:24px 0;color:#a09890;font-size:14px">Geen aankomende nestafspraken gevonden.</p>';
        showStatusLoad('', '');
        document.getElementById('loadPlanningBtn').textContent = 'Planning vernieuwen';
        document.getElementById('loadPlanningBtn').disabled = false; return;
      }

      const groups = {}, order = [];
      for (const e of nestEvents) {
        const match = e.summary.match(/–\s*(.+)$/);
        const nest  = match ? match[1].trim() : 'Overig';
        if (!groups[nest]) { groups[nest] = []; order.push(nest); }
        groups[nest].push(e);
      }

      let html = '';
      for (const nest of order) {
        html += `<div class="planning-group"><div class="planning-nest-name">${nest}</div>`;
        for (const e of groups[nest]) {
          const dateStr = (e.start.date || e.start.dateTime || '').substring(0, 10);
          const dateLabel = new Date(dateStr + 'T00:00:00').toLocaleDateString('nl-NL', { weekday: 'short', day: 'numeric', month: 'long' });
          html += `
            <div class="planning-event">
              <div class="planning-dot"></div>
              <div class="planning-info">
                <div class="planning-title">${e.summary.replace(/ –.*$/, '')}</div>
                <div class="planning-date">${dateLabel}</div>
              </div>
            </div>`;
        }
        html += `</div>`;
      }

      el.innerHTML = html;
      document.getElementById('statusLoad').style.display = 'none';
      document.getElementById('loadPlanningBtn').textContent = 'Planning vernieuwen';
      document.getElementById('loadPlanningBtn').disabled = false;
    }

    function showStatusLoad(msg, type) {
      const el = document.getElementById('statusLoad');
      if (!msg) { el.style.display = 'none'; return; }
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    function showEventList(events) {
      const el = document.getElementById('eventList');
      el.style.display = 'block';
      el.innerHTML = `<div style="height:1px;background:#e8e4de;margin:24px 0 20px"></div><p class="event-list-title">Aangemaakte afspraken</p>`;

      for (const e of events) {
        el.innerHTML += `
          <div class="event-item">
            <div class="event-check">&#10003;</div>
            <div class="event-info">
              <div class="event-title">${e.title}</div>
              <div class="event-date">${formatDate(e.date)}</div>
            </div>
            <span class="event-week">${e.week}</span>
          </div>
        `;
      }
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
    // prefill geboortedatum vanuit fokkerij 1-klik koppeling
    const _p = new URLSearchParams(window.location.search);
    if (_p.get('geboortedatum')) document.getElementById('geboortedatum').value = _p.get('geboortedatum');
  </script>
</body>
</html>
