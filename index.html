<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nestplanning - Emmaliedoodles</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f0eb;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 560px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: #8b5e3c;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .logo-text h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .logo-text p {
      font-size: 13px;
      color: #888;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="date"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0d8d0;
      border-radius: 10px;
      font-size: 15px;
      color: #1a1a1a;
      background: #fdfaf7;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="date"]:focus {
      border-color: #8b5e3c;
      background: white;
    }

    .hint {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #8b5e3c;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn:hover { background: #74502f; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #c8b09a; cursor: not-allowed; transform: none; }

    .status {
      margin-top: 24px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .status.info {
      background: #eef4ff;
      color: #3b6fd4;
      border: 1px solid #c7d9f8;
      display: block;
    }

    .status.error {
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      display: block;
    }

    .status.success {
      background: #f0faf4;
      color: #1e7d46;
      border: 1px solid #b8e8cb;
      display: block;
    }

    .event-list {
      margin-top: 24px;
      display: none;
    }

    .event-list h3 {
      font-size: 14px;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .event-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: #fdfaf7;
      border-radius: 8px;
      margin-bottom: 6px;
      border: 1px solid #f0e8e0;
    }

    .event-check {
      width: 20px;
      height: 20px;
      background: #1e7d46;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: white;
      font-size: 11px;
    }

    .event-info { flex: 1; }

    .event-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .event-date {
      font-size: 12px;
      color: #999;
      margin-top: 1px;
    }

    .event-week {
      font-size: 12px;
      color: #8b5e3c;
      font-weight: 600;
      background: #f5ede4;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .divider {
      height: 1px;
      background: #f0e8e0;
      margin: 24px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🐾</div>
      <div class="logo-text">
        <h1>Nestplanning</h1>
        <p>Emmaliedoodles</p>
      </div>
    </div>

    <div class="form-group">
      <label for="nestnaam">Nestnaam</label>
      <input type="text" id="nestnaam" placeholder="bijv. Nestje Rood" autocomplete="off">
      <p class="hint">Wordt toegevoegd aan elke afspraak in de agenda</p>
    </div>

    <div class="form-group">
      <label for="geboortedatum">Geboortedatum pups</label>
      <input type="date" id="geboortedatum">
    </div>

    <button class="btn" id="planBtn" onclick="startFlow()">
      Inloggen met Google en planning aanmaken
    </button>

    <div class="status" id="status"></div>
    <div class="event-list" id="eventList"></div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const CLIENT_ID = '248696672626-0tcv73h1m27ekf2vc3k41vu5cb3l4sob.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/calendar';
    const CALENDAR_NAME = 'Emmaliedoodles';

    const SCHEMA = [
      { day: 21,  week: 'Week 3',   title: 'Ontwormen' },
      { day: 28,  week: 'Week 4',   title: 'Kennismakingsgesprekken kopers' },
      { day: 35,  week: 'Week 5',   title: 'Ontwormen' },
      { day: 42,  week: 'Week 6',   title: 'Vaccinatie + chip' },
      { day: 42,  week: 'Week 6',   title: 'Puppy kijkmoment + voorkeur doorgeven' },
      { day: 49,  week: 'Week 7',   title: 'Ontwormen' },
      { day: 53,  week: 'Week 7.5', title: 'Pups vertrekklaar' },
      { day: 56,  week: 'Week 8',   title: 'Pups vertrekken' },
    ];

    let tokenClient = null;
    let accessToken = null;

    function initTokenClient() {
      if (tokenClient) return;
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: handleToken,
      });
    }

    function startFlow() {
      const nestnaam = document.getElementById('nestnaam').value.trim();
      const geboortedatum = document.getElementById('geboortedatum').value;

      if (!nestnaam) { showStatus('Vul een nestnaam in.', 'error'); return; }
      if (!geboortedatum) { showStatus('Vul een geboortedatum in.', 'error'); return; }

      if (typeof google === 'undefined') {
        showStatus('Google script nog niet geladen. Wacht even en probeer opnieuw.', 'error');
        return;
      }

      document.getElementById('planBtn').disabled = true;
      document.getElementById('eventList').style.display = 'none';

      initTokenClient();
      tokenClient.requestAccessToken({ prompt: 'consent' });
    }

    async function handleToken(response) {
      if (response.error) {
        showStatus('Inloggen mislukt: ' + response.error, 'error');
        document.getElementById('planBtn').disabled = false;
        return;
      }
      accessToken = response.access_token;
      await createAllEvents();
    }

    async function findCalendarId() {
      const res = await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList', {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      if (!res.ok) throw new Error('Kan agendalist niet ophalen.');
      const data = await res.json();
      const cal = (data.items || []).find(c =>
        c.summary && c.summary.toLowerCase() === CALENDAR_NAME.toLowerCase()
      );
      return cal ? cal.id : null;
    }

    function addDays(dateStr, days) {
      const d = new Date(dateStr + 'T00:00:00');
      d.setDate(d.getDate() + days);
      return d.toISOString().split('T')[0];
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    async function createAllEvents() {
      const nestnaam = document.getElementById('nestnaam').value.trim();
      const geboortedatum = document.getElementById('geboortedatum').value;

      showStatus('Emmaliedoodles agenda zoeken...', 'info');

      let calendarId;
      try {
        calendarId = await findCalendarId();
      } catch (e) {
        showStatus(e.message, 'error');
        document.getElementById('planBtn').disabled = false;
        return;
      }

      if (!calendarId) {
        showStatus(`Agenda "${CALENDAR_NAME}" niet gevonden. Zorg dat deze agenda bestaat in Google Agenda.`, 'error');
        document.getElementById('planBtn').disabled = false;
        return;
      }

      const created = [];

      for (let i = 0; i < SCHEMA.length; i++) {
        const item = SCHEMA[i];
        showStatus(`Aanmaken ${i + 1} van ${SCHEMA.length}...`, 'info');

        const dateStr = addDays(geboortedatum, item.day);
        const nextDay = addDays(geboortedatum, item.day + 1);

        const body = {
          summary: `${item.title} \u2013 ${nestnaam}`,
          description: `${item.week} | Nestje: ${nestnaam}\nGeboren: ${formatDate(geboortedatum)}`,
          start: { date: dateStr },
          end:   { date: nextDay },
        };

        const res = await fetch(
          `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events`,
          {
            method: 'POST',
            headers: {
              Authorization: `Bearer ${accessToken}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(body),
          }
        );

        if (!res.ok) {
          const err = await res.json();
          showStatus(`Fout bij aanmaken "${item.title}": ${err.error?.message || res.status}`, 'error');
          document.getElementById('planBtn').disabled = false;
          return;
        }

        created.push({ ...item, date: dateStr });
      }

      showStatus(`Klaar! ${created.length} afspraken aangemaakt in de ${CALENDAR_NAME} agenda.`, 'success');
      showEventList(created);
      document.getElementById('planBtn').disabled = false;
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    function showEventList(events) {
      const el = document.getElementById('eventList');
      el.style.display = 'block';
      el.innerHTML = `<div style="height:1px;background:#f0e8e0;margin-bottom:16px"></div><h3>Aangemaakte afspraken</h3>`;

      for (const e of events) {
        el.innerHTML += `
          <div class="event-item">
            <div class="event-check">&#10003;</div>
            <div class="event-info">
              <div class="event-title">${e.title}</div>
              <div class="event-date">${formatDate(e.date)}</div>
            </div>
            <span class="event-week">${e.week}</span>
          </div>
        `;
      }
    }
  </script>
</body>
</html>
