<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drachtplanner - Emmaliedoodles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=Public+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8b9a78">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Public Sans', system-ui, sans-serif;
      font-weight: 300;
      background: #f4f1ec;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
    }

    .app-header {
      width: 100%;
      background: white;
      border-bottom: 1px solid #e8e4de;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .app-header-title {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 20px;
      color: #43554f;
      letter-spacing: -0.02em;
    }

    .back-btn {
      font-family: 'Public Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: #5f6e5e;
      text-decoration: none;
    }
    .back-btn:hover { color: #43554f; }

    .card {
      background: white;
      border-radius: 4px;
      padding: 32px 24px;
      width: 100%;
      max-width: 560px;
      margin-top: 24px;
    }

    @media (min-width: 480px) {
      .card { padding: 48px; }
      body { padding: 0 16px 40px; }
    }

    .header { margin-bottom: 32px; }

    .header h1 {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 32px;
      color: #43554f;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }

    .header p {
      font-size: 14px;
      font-weight: 300;
      color: #5f6e5e;
      margin-top: 6px;
    }

    .card-subtitle {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 20px;
      color: #43554f;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 24px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #43554f;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="date"] {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid #d6d0c8;
      border-radius: 2px;
      font-family: 'Public Sans', sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: #282D33;
      background: #faf8f5;
      transition: border-color 0.3s;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="text"]:focus,
    input[type="date"]:focus {
      border-color: #43554f;
      background: white;
    }

    input[type="text"]::placeholder { color: #b0a898; }

    .hint {
      font-size: 12px;
      font-weight: 300;
      color: #a09890;
      margin-top: 5px;
    }

    /* ── preview table ── */
    .preview {
      background: #f4f1ec;
      border-radius: 4px;
      padding: 20px;
      margin-bottom: 24px;
      display: none;
    }

    .preview-title {
      font-size: 11px;
      font-weight: 500;
      color: #a09890;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .preview-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid #e8e4de;
    }
    .preview-row:last-child { border-bottom: none; }

    .preview-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .icon-loopsheid { background: #fde8e6; }
    .icon-dekking   { background: #fff3cd; }
    .icon-echo      { background: #d4edda; }
    .icon-worp      { background: #d1ecf1; }

    .preview-info { flex: 1; }

    .preview-label {
      font-size: 13px;
      font-weight: 500;
      color: #282D33;
    }

    .preview-date {
      font-size: 13px;
      font-weight: 300;
      color: #5f6e5e;
      margin-top: 2px;
    }

    .preview-note {
      font-size: 11px;
      color: #a09890;
      margin-top: 2px;
    }

    /* ── buttons ── */
    .btn {
      width: 100%;
      padding: 15px 24px;
      background: #43554f;
      color: white;
      border: none;
      border-radius: 100px;
      font-family: 'Public Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.3s, opacity 0.3s, transform 0.3s, box-shadow 0.3s;
      margin-top: 8px;
    }

    .btn:hover {
      background: #5f6e5e;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(67, 85, 79, 0.2);
    }

    .btn:active { transform: translateY(0); }

    .btn:disabled {
      background: #a3b0ab;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: white;
      color: #43554f;
      border: 1.5px solid #43554f;
      margin-top: 10px;
    }

    .btn-secondary:hover { background: #f4f1ec; }

    .btn-secondary:disabled {
      background: white;
      color: #a3b0ab;
      border-color: #a3b0ab;
    }

    /* ── status / feedback ── */
    .status {
      margin-top: 24px;
      padding: 14px 18px;
      border-radius: 2px;
      font-size: 14px;
      font-weight: 300;
      display: none;
    }

    .status.info    { background: #edf0ef; color: #43554f;  border-left: 3px solid #43554f;  display: block; }
    .status.error   { background: #fdf0ef; color: #8b3a32;  border-left: 3px solid #c0392b;  display: block; }
    .status.success { background: #edf2ef; color: #2e5240;  border-left: 3px solid #43554f;  display: block; }

    /* ── created event list ── */
    .event-list { margin-top: 24px; display: none; }

    .event-list-title {
      font-size: 11px;
      font-weight: 500;
      color: #a09890;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .event-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid #f0ece6;
    }
    .event-item:last-child { border-bottom: none; }

    .event-check {
      width: 22px;
      height: 22px;
      background: #43554f;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: white;
      font-size: 11px;
    }

    .event-info { flex: 1; }

    .event-title {
      font-size: 14px;
      font-weight: 400;
      color: #282D33;
    }

    .event-date {
      font-size: 12px;
      font-weight: 300;
      color: #a09890;
      margin-top: 2px;
    }

    .event-tag {
      font-size: 11px;
      font-weight: 500;
      color: #5f6e5e;
      background: #edf0ef;
      padding: 3px 10px;
      border-radius: 100px;
      white-space: nowrap;
    }

    /* ── planning overview ── */
    .divider {
      height: 1px;
      background: #e8e4de;
      margin: 0 0 28px;
    }

    .planning-group { margin-bottom: 28px; }

    .planning-dog-name {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 16px;
      color: #43554f;
      margin-bottom: 10px;
    }

    .planning-event {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f0ece6;
    }
    .planning-event:last-child { border-bottom: none; }

    .planning-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .planning-info { flex: 1; }

    .planning-title {
      font-size: 14px;
      font-weight: 400;
      color: #282D33;
    }

    .planning-date {
      font-size: 12px;
      color: #a09890;
      margin-top: 2px;
    }

    .empty-planning {
      text-align: center;
      padding: 32px 0;
      color: #a09890;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <span class="app-header-title">Emmaliedoodles</span>
    <a href="index.html" class="back-btn">&#8592; Fokprogramma</a>
  </header>

  <!-- Invoer card -->
  <div class="card">
    <div class="header">
      <h1>Drachtplanner</h1>
      <p>Van loopsheid tot bevalling &mdash; Australian Labradoodles</p>
    </div>

    <div class="form-group">
      <label for="naam">Naam hond</label>
      <input type="text" id="naam" placeholder="bijv. Aaf" autocomplete="off" oninput="updatePreview()">
    </div>

    <div class="form-group">
      <label for="loopsheid">Eerste dag loopsheid</label>
      <input type="date" id="loopsheid" oninput="updatePreview()">
      <p class="hint">Dag 1 van de loopsheid</p>
    </div>

    <div class="preview" id="preview">
      <div class="preview-title">Berekende planning</div>
      <div id="previewRows"></div>
    </div>

    <button class="btn" id="planBtn" onclick="startFlow('create')">
      Toevoegen aan Google Agenda
    </button>

    <div class="status" id="statusCreate"></div>
    <div class="event-list" id="eventList"></div>
  </div>

  <!-- Huidige planning card -->
  <div class="card" style="margin-top:16px">
    <div class="divider" style="display:none" id="planningDivider"></div>
    <div class="card-subtitle">Huidige planning</div>
    <p style="font-size:14px;color:#5f6e5e;margin-bottom:20px">Bekijk aankomende dracht-afspraken in de agenda</p>
    <button class="btn btn-secondary" id="loadBtn" onclick="startFlow('load')">
      Inloggen en planning tonen
    </button>
    <div class="status" id="statusLoad"></div>
    <div id="planningList" style="margin-top:24px"></div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const CLIENT_ID    = '248696672626-0tcv73h1m27ekf2vc3k41vu5cb3l4sob.apps.googleusercontent.com';
    const SCOPES       = 'https://www.googleapis.com/auth/calendar';
    const CALENDAR_NAME = 'Emmaliedoodles';

    // Mating day 10, echo day 28 after mating (= day 38 from heat), worp day 58-63 after mating
    const SCHEMA = [
      {
        key: 'dekking',
        label: 'Dekking',
        tag: 'Dag 10',
        daysFromHeat: 10,
        iconClass: 'icon-dekking',
        icon: '🔑',
        multiDay: false,
      },
      {
        key: 'echo',
        label: 'Echo',
        tag: 'Dag 38',
        daysFromHeat: 38,
        iconClass: 'icon-echo',
        icon: '🔬',
        multiDay: false,
        note: 'Dag 28 na dekking — dracht bevestigen',
      },
      {
        key: 'worp',
        label: 'Verwachte worp',
        tag: 'Dag 68–73',
        daysFromHeat: 68,
        daysEndFromHeat: 74,
        iconClass: 'icon-worp',
        icon: '🐶',
        multiDay: true,
        note: 'Dag 58–63 na dekking — bevalling verwacht',
      },
    ];

    let tokenClient  = null;
    let accessToken  = null;
    let pendingAction = null;

    // ── date helpers ──────────────────────────────────────────────────

    function addDays(dateStr, n) {
      const d = new Date(dateStr + 'T00:00:00');
      d.setDate(d.getDate() + n);
      return isoDate(d);
    }

    function isoDate(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function formatDate(dateStr) {
      return new Date(dateStr + 'T00:00:00').toLocaleDateString('nl-NL', {
        weekday: 'long', day: 'numeric', month: 'long'
      });
    }

    function formatDateShort(dateStr) {
      return new Date(dateStr + 'T00:00:00').toLocaleDateString('nl-NL', {
        day: 'numeric', month: 'long', year: 'numeric'
      });
    }

    function formatRange(fromStr, toInclStr) {
      const from = new Date(fromStr + 'T00:00:00');
      const to   = new Date(toInclStr + 'T00:00:00');
      to.setDate(to.getDate() - 1); // calendar API end is exclusive
      const f = from.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' });
      const t = to.toLocaleDateString('nl-NL',   { day: 'numeric', month: 'long', year: 'numeric' });
      return `${f} t/m ${t}`;
    }

    // ── live preview ──────────────────────────────────────────────────

    function updatePreview() {
      const naam      = document.getElementById('naam').value.trim();
      const loopsheid = document.getElementById('loopsheid').value;
      const preview   = document.getElementById('preview');
      const rows      = document.getElementById('previewRows');

      if (!naam || !loopsheid) {
        preview.style.display = 'none';
        return;
      }

      const loopsheidDate = new Date(loopsheid + 'T00:00:00');
      const loopsheidFmt  = loopsheidDate.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });

      let html = `
        <div class="preview-row">
          <div class="preview-icon icon-loopsheid">🔴</div>
          <div class="preview-info">
            <div class="preview-label">Loopsheid</div>
            <div class="preview-date">${loopsheidFmt}</div>
            <div class="preview-note">Dag 1</div>
          </div>
        </div>
      `;

      for (const s of SCHEMA) {
        const dateFrom = addDays(loopsheid, s.daysFromHeat);
        const dateLabel = s.multiDay
          ? formatRange(dateFrom, addDays(loopsheid, s.daysEndFromHeat))
          : formatDateShort(dateFrom);

        html += `
          <div class="preview-row">
            <div class="preview-icon ${s.iconClass}">${s.icon}</div>
            <div class="preview-info">
              <div class="preview-label">${s.label}</div>
              <div class="preview-date">${dateLabel}</div>
              ${s.note ? `<div class="preview-note">${s.note}</div>` : ''}
            </div>
          </div>
        `;
      }

      rows.innerHTML = html;
      preview.style.display = 'block';
    }

    // ── Google auth ───────────────────────────────────────────────────

    function initTokenClient() {
      if (tokenClient) return;
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: handleToken,
      });
    }

    function startFlow(action) {
      if (action === 'create') {
        const naam      = document.getElementById('naam').value.trim();
        const loopsheid = document.getElementById('loopsheid').value;
        if (!naam)      { showStatus('statusCreate', 'Vul een naam in.', 'error');              return; }
        if (!loopsheid) { showStatus('statusCreate', 'Vul de datum van de loopsheid in.', 'error'); return; }
      }

      if (typeof google === 'undefined') {
        const statusId = action === 'create' ? 'statusCreate' : 'statusLoad';
        showStatus(statusId, 'Google script nog niet geladen. Wacht even en probeer opnieuw.', 'error');
        return;
      }

      pendingAction = action;
      document.getElementById('planBtn').disabled = true;
      document.getElementById('loadBtn').disabled = true;

      initTokenClient();
      if (accessToken) {
        dispatchAction(action);
      } else {
        tokenClient.requestAccessToken({ prompt: '' });
      }
    }

    async function handleToken(response) {
      if (response.error) {
        showStatus('statusCreate', 'Inloggen mislukt: ' + response.error, 'error');
        document.getElementById('planBtn').disabled = false;
        document.getElementById('loadBtn').disabled = false;
        return;
      }
      accessToken = response.access_token;
      const action = pendingAction;
      pendingAction = null;
      dispatchAction(action);
    }

    function dispatchAction(action) {
      if (action === 'create') createEvents();
      else if (action === 'load') loadPlanning();
    }

    // ── calendar helpers ──────────────────────────────────────────────

    async function findCalendarId() {
      const res = await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList?showHidden=true', {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      if (!res.ok) throw new Error('Kan agendalist niet ophalen.');
      const data = await res.json();
      const cal = (data.items || []).find(c =>
        c.summary && c.summary.toLowerCase() === CALENDAR_NAME.toLowerCase()
      );
      return cal ? cal.id : null;
    }

    // ── create events ─────────────────────────────────────────────────

    async function createEvents() {
      const naam      = document.getElementById('naam').value.trim();
      const loopsheid = document.getElementById('loopsheid').value;

      showStatus('statusCreate', 'Emmaliedoodles agenda zoeken...', 'info');

      let calendarId;
      try { calendarId = await findCalendarId(); }
      catch (e) { showStatus('statusCreate', e.message, 'error'); resetBtns(); return; }

      if (!calendarId) {
        showStatus('statusCreate', `Agenda "${CALENDAR_NAME}" niet gevonden.`, 'error');
        resetBtns(); return;
      }

      const loopsheidFmt = formatDate(loopsheid);
      const matingDate   = addDays(loopsheid, 10);
      const created = [];

      for (let idx = 0; idx < SCHEMA.length; idx++) {
        const s = SCHEMA[idx];
        showStatus('statusCreate', `Aanmaken ${idx + 1} van ${SCHEMA.length}...`, 'info');

        const dateFrom = addDays(loopsheid, s.daysFromHeat);
        const dateEnd  = s.multiDay
          ? addDays(loopsheid, s.daysEndFromHeat)
          : addDays(loopsheid, s.daysFromHeat + 1);

        const description = [
          `${s.tag} | Hond: ${naam}`,
          `Loopsheid begon: ${loopsheidFmt}`,
          `Verwachte dekking: ${formatDate(matingDate)}`,
          s.note ? `\n${s.note}` : '',
        ].filter(Boolean).join('\n');

        const body = {
          summary: `${s.label} – ${naam}`,
          description,
          start: { date: dateFrom },
          end:   { date: dateEnd },
        };

        const res = await fetch(
          `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events`,
          {
            method: 'POST',
            headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          }
        );

        if (!res.ok) {
          const err = await res.json();
          showStatus('statusCreate', `Fout bij "${s.label}": ${err.error?.message || res.status}`, 'error');
          resetBtns(); return;
        }

        created.push({ label: s.label, tag: s.tag, dateFrom, dateEnd: s.multiDay ? addDays(loopsheid, s.daysEndFromHeat - 1) : dateFrom, multiDay: s.multiDay });
      }

      showStatus('statusCreate', `Klaar! ${created.length} afspraken aangemaakt in de ${CALENDAR_NAME} agenda.`, 'success');
      showEventList(created);
      resetBtns();
    }

    function showEventList(events) {
      const el = document.getElementById('eventList');
      el.style.display = 'block';
      el.innerHTML = `<div style="height:1px;background:#e8e4de;margin:24px 0 20px"></div><p class="event-list-title">Aangemaakte afspraken</p>`;

      for (const e of events) {
        const dateLabel = e.multiDay
          ? `${formatDateShort(e.dateFrom)} t/m ${formatDateShort(e.dateEnd)}`
          : formatDateShort(e.dateFrom);

        el.innerHTML += `
          <div class="event-item">
            <div class="event-check">&#10003;</div>
            <div class="event-info">
              <div class="event-title">${e.label}</div>
              <div class="event-date">${dateLabel}</div>
            </div>
            <span class="event-tag">${e.tag}</span>
          </div>
        `;
      }
    }

    // ── load planning ─────────────────────────────────────────────────

    async function loadPlanning() {
      showStatus('statusLoad', 'Planning ophalen...', 'info');

      let calendarId;
      try { calendarId = await findCalendarId(); }
      catch (e) { showStatus('statusLoad', e.message, 'error'); resetBtns(); return; }

      if (!calendarId) {
        showStatus('statusLoad', `Agenda "${CALENDAR_NAME}" niet gevonden.`, 'error');
        resetBtns(); return;
      }

      const now      = new Date();
      const timeMin  = encodeURIComponent(isoDate(now) + 'T00:00:00Z');
      const future   = new Date(now);
      future.setMonth(future.getMonth() + 18);
      const timeMax  = encodeURIComponent(isoDate(future) + 'T00:00:00Z');

      let events = [];
      let pageToken = null;
      do {
        const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events?timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime&maxResults=250${pageToken ? '&pageToken=' + pageToken : ''}`;
        const res = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
        if (!res.ok) { showStatus('statusLoad', 'Fout bij ophalen afspraken.', 'error'); resetBtns(); return; }
        const data = await res.json();
        events = events.concat(data.items || []);
        pageToken = data.nextPageToken || null;
      } while (pageToken);

      // filter for drachtplanner events by matching known title prefixes
      const PREFIXES = ['Dekking –', 'Echo –', 'Verwachte worp –'];
      const drachtEvents = events.filter(e =>
        e.status !== 'cancelled' && e.summary &&
        PREFIXES.some(p => e.summary.startsWith(p))
      );

      if (!drachtEvents.length) {
        document.getElementById('planningList').innerHTML =
          '<p class="empty-planning">Geen aankomende dracht-afspraken gevonden.</p>';
        showStatus('statusLoad', '', '');
        document.getElementById('statusLoad').style.display = 'none';
        document.getElementById('loadBtn').textContent = 'Planning vernieuwen';
        resetBtns(); return;
      }

      // group by dog name (part after " – ")
      const groups = {};
      const order  = [];
      for (const e of drachtEvents) {
        const match = e.summary.match(/–\s*(.+)$/);
        const dog   = match ? match[1].trim() : 'Overig';
        if (!groups[dog]) { groups[dog] = []; order.push(dog); }
        groups[dog].push(e);
      }

      const DOT_COLORS = {
        'Dekking':        '#f0b429',
        'Echo':           '#43554f',
        'Verwachte worp': '#3a86c4',
      };

      let html = '';
      for (const dog of order) {
        html += `<div class="planning-group"><div class="planning-dog-name">${escHtml(dog)}</div>`;
        for (const e of groups[dog]) {
          const prefix = PREFIXES.find(p => e.summary.startsWith(p));
          const type   = prefix ? prefix.replace(' –', '').trim() : '';
          const color  = DOT_COLORS[type] || '#a09890';
          const dateStr = (e.start.date || e.start.dateTime || '').substring(0, 10);
          const endStr  = (e.end.date || '').substring(0, 10);
          let dateLabel;
          if (e.start.date && endStr) {
            const endIncl = new Date(endStr + 'T00:00:00');
            endIncl.setDate(endIncl.getDate() - 1);
            const endInclStr = isoDate(endIncl);
            dateLabel = endInclStr !== dateStr
              ? `${formatDateShort(dateStr)} t/m ${formatDateShort(endInclStr)}`
              : formatDateShort(dateStr);
          } else {
            dateLabel = formatDateShort(dateStr);
          }
          html += `
            <div class="planning-event">
              <div class="planning-dot" style="background:${color}"></div>
              <div class="planning-info">
                <div class="planning-title">${escHtml(e.summary)}</div>
                <div class="planning-date">${dateLabel}</div>
              </div>
            </div>
          `;
        }
        html += `</div>`;
      }

      document.getElementById('planningList').innerHTML = html;
      document.getElementById('statusLoad').style.display = 'none';
      document.getElementById('loadBtn').textContent = 'Planning vernieuwen';
      resetBtns();
    }

    // ── utils ─────────────────────────────────────────────────────────

    function showStatus(id, msg, type) {
      const el = document.getElementById(id);
      if (!msg) { el.style.display = 'none'; return; }
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    function resetBtns() {
      document.getElementById('planBtn').disabled = false;
      document.getElementById('loadBtn').disabled = false;
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
