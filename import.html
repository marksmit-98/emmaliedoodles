<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Import — Emmaliedoodles</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f1ec; padding: 40px 16px; }
    .card { background: white; border-radius: 4px; padding: 32px; max-width: 560px; margin: 0 auto; }
    h1 { font-size: 22px; color: #43554f; margin-bottom: 8px; }
    p { font-size: 14px; color: #5f6e5e; margin-bottom: 24px; line-height: 1.6; }
    button {
      padding: 12px 24px; background: #43554f; color: white; border: none;
      border-radius: 100px; font-size: 14px; font-weight: 500; cursor: pointer;
    }
    button:disabled { background: #a3b0ab; cursor: not-allowed; }
    #log {
      margin-top: 24px; font-size: 13px; color: #282D33;
      border: 1px solid #e8e4de; border-radius: 4px; padding: 16px;
      max-height: 400px; overflow-y: auto; display: none;
    }
    .ok   { color: #2e5240; }
    .err  { color: #8b3a32; }
    .info { color: #5f6e5e; }
    .warn { color: #8a6a00; }
  </style>
</head>
<body>
<div class="card">
  <h1>Eenmalige data-import</h1>
  <p>
    Importeert 12 honden en 9 loopsheden naar Firebase Firestore.<br>
    Log in met een toegestaan account en klik op de knop.<br>
    <strong>Verwijder deze pagina daarna uit de repo.</strong>
  </p>
  <button id="btn" onclick="runImport()">Inloggen &amp; importeren</button>
  <div id="log"></div>
</div>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup }
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs }
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const ALLOWED = ['mark.smit1998@gmail.com', 'doodledelux@gmail.com'];

const fbApp = initializeApp({
  apiKey:            "AIzaSyASmYheBLtR2VKAtMw396RUIC_iUT65FMg",
  authDomain:        "emmaliedoodles-7f93e.firebaseapp.com",
  projectId:         "emmaliedoodles-7f93e",
  storageBucket:     "emmaliedoodles-7f93e.firebasestorage.app",
  messagingSenderId: "513871307896",
  appId:             "1:513871307896:web:27349ccaf037c548f4b98d",
});
const auth = getAuth(fbApp);
const db   = getFirestore(fbApp);

// ── data ─────────────────────────────────────────────
const DOGS = [
  { name: 'Fleur',                           birthDate: '2021-06-12', fosterFamily: 'Tante Beppie',         color: 'Zwart',           pattern: 'Solid',         status: 'Gepensioneerd', nestsCount: 3, notes: null },
  { name: 'Pip',                             birthDate: '2022-12-09', fosterFamily: 'Jannie Zeevat',        color: 'Creme caramel',   pattern: 'Solid',         status: 'Actief',        nestsCount: 2, notes: null },
  { name: 'Ava Michelle',                    birthDate: '2023-05-29', fosterFamily: 'Michelle & Laurens',   color: 'Rood',            pattern: 'Solid',         status: 'Gepensioneerd', nestsCount: 2, notes: null },
  { name: 'Aaf',                             birthDate: '2024-06-28', fosterFamily: 'Esther (Vaassen)',     color: 'Apricot',         pattern: 'Solid',         status: 'Actief',        nestsCount: 0, notes: null },
  { name: 'Mollie',                          birthDate: '2024-08-10', fosterFamily: 'Eigen hond',           color: 'Apricot',         pattern: 'Abstract (wit)',status: 'Actief',        nestsCount: 0, notes: null },
  { name: 'Zoë',                             birthDate: '2024-12-14', fosterFamily: 'Alex & Monique',       color: 'Chocolade Bruin', pattern: 'Abstract (wit)',status: 'Actief',        nestsCount: 0, notes: null },
  { name: 'Sterre',                          birthDate: '2024-12-14', fosterFamily: 'Femke (Harderwijk)',   color: 'Creme caramel',   pattern: 'Solid',         status: 'Actief',        nestsCount: 0, notes: null },
  { name: 'Lily Rose',                       birthDate: '2025-09-21', fosterFamily: 'Angelique & Remco',   color: 'Creme caramel',   pattern: 'Abstract (wit)',status: 'In opbouw',     nestsCount: 0, notes: null },
  { name: 'Daisy Joy',                       birthDate: '2025-12-20', fosterFamily: 'Christa Bos',         color: 'Apricot',         pattern: 'Abstract (wit)',status: 'In opbouw',     nestsCount: 0, notes: null },
  { name: 'Mikkie',                          birthDate: '2026-01-09', fosterFamily: 'Daphne & Bart Mous',  color: 'Red',             pattern: 'Solid',         status: 'In opbouw',     nestsCount: 0, notes: null },
  { name: 'Noor',                            birthDate: '2025-12-20', fosterFamily: 'Alianne van de Laan', color: 'Apricot',         pattern: 'Abstract (wit)',status: 'In opbouw',     nestsCount: 0, notes: null },
  { name: 'Sweet Angela Birgit Cecilia (Lia)', birthDate: '2026-01-09', fosterFamily: 'Eigen hond',        color: 'Dark Caramel',    pattern: 'Solid',         status: 'In opbouw',     nestsCount: 0, notes: null },
];

// dogName is resolved to dogId during import
const CYCLES = [
  { dogName: 'Zoë',   startDate: '2025-10-04', mated: false, notes: null },
  { dogName: 'Pip',   startDate: '2025-10-09', mated: true,  notes: null },
  { dogName: 'Sterre',startDate: '2025-11-12', mated: false, notes: null },
  { dogName: 'Mollie',startDate: '2025-12-30', mated: false, notes: null },
  { dogName: 'Aaf',   startDate: '2026-02-09', mated: false, notes: null },
  { dogName: 'Ava Michelle', startDate: '2026-01-22', mated: true,  notes: null },
  { dogName: 'Zoë',   startDate: '2026-04-29', mated: true,  notes: null },
  { dogName: 'Sterre',startDate: '2026-05-18', mated: true,  notes: null },
  { dogName: 'Pip',   startDate: '2026-05-22', mated: false, notes: null },
];

// ── import ────────────────────────────────────────────
window.runImport = async () => {
  const btn = document.getElementById('btn');
  const log = document.getElementById('log');
  log.style.display = 'block';
  btn.disabled = true;

  function line(msg, cls = 'info') {
    log.innerHTML += `<div class="${cls}">${msg}</div>`;
    log.scrollTop = log.scrollHeight;
  }

  // auth
  line('Inloggen met Google...');
  let user;
  try {
    const result = await signInWithPopup(auth, new GoogleAuthProvider());
    user = result.user;
  } catch (e) {
    line('Inloggen mislukt: ' + e.message, 'err');
    btn.disabled = false;
    return;
  }

  if (!ALLOWED.includes(user.email)) {
    line('Account heeft geen toegang: ' + user.email, 'err');
    btn.disabled = false;
    return;
  }
  line(`Ingelogd als ${user.email}`, 'ok');

  // check bestaande data
  line('Bestaande data controleren...');
  const existingDogs = await getDocs(collection(db, 'dogs'));
  if (!existingDogs.empty) {
    line(`Waarschuwing: er staan al ${existingDogs.size} honden in Firestore. Import gaat door (duplicaten mogelijk).`, 'warn');
  }

  // honden importeren
  line('— Honden importeren —');
  const dogIdMap = {}; // name → id
  for (const dog of DOGS) {
    try {
      const ref = await addDoc(collection(db, 'dogs'), dog);
      dogIdMap[dog.name] = ref.id;
      line(`✓ ${dog.name} (${dog.status})`, 'ok');
    } catch (e) {
      line(`✗ ${dog.name}: ${e.message}`, 'err');
    }
  }

  // loopsheden importeren
  line('— Loopsheden importeren —');
  for (const cycle of CYCLES) {
    const dogId = dogIdMap[cycle.dogName];
    if (!dogId) {
      line(`✗ Hond niet gevonden: ${cycle.dogName}`, 'err');
      continue;
    }
    try {
      await addDoc(collection(db, 'heatCycles'), {
        dogId,
        startDate: cycle.startDate,
        mated:     cycle.mated,
        notes:     cycle.notes,
      });
      line(`✓ ${cycle.dogName} — ${cycle.startDate} (${cycle.mated ? 'gedekt' : 'niet gedekt'})`, 'ok');
    } catch (e) {
      line(`✗ ${cycle.dogName} ${cycle.startDate}: ${e.message}`, 'err');
    }
  }

  line('— Klaar! Verwijder nu import.html uit de repo. —', 'ok');
  btn.textContent = 'Import voltooid';
};
</script>
</body>
</html>
